<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatForge Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Exo+2:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #070710;
      --cyan: #00e5ff;
      --orange: #ff6b35;
      --panel: rgba(13,13,28,0.92);
      --border: rgba(0,229,255,0.18);
      --text: #dde0f0;
      --text-dim: rgba(221,224,240,0.5);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #bg-canvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events: none;
      opacity: 0.35;
    }
    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    /* Logo */
    .logo { text-align: center; }
    .logo-icon {
      font-size: 3rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.6));
      display: block;
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(0,229,255,0.5)); }
      50% { filter: drop-shadow(0 0 32px rgba(0,229,255,0.9)); }
    }
    .logo h1 {
      font-family: 'Space Mono', monospace;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.04em;
      text-shadow: 0 0 40px rgba(0,229,255,0.4);
      line-height: 1;
    }
    .logo .tag {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 10px;
    }

    /* Card */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 40px;
      width: 360px;
      backdrop-filter: blur(24px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card p {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn {
      width: 100%;
      padding: 13px 18px;
      border-radius: 10px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .btn-google {
      background: #fff;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .btn-google:hover { background: #f4f4f4; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .btn-google:active { transform: translateY(0); }
    .btn-guest {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.82rem;
    }
    .btn-guest:hover { color: var(--text); border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.03); }

    #error-msg {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #ff6060;
      display: none;
      text-align: center;
    }

    /* Features */
    .features {
      display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    }
    .feat {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 72px;
      transition: all 0.2s;
    }
    .feat:hover {
      background: rgba(0,229,255,0.06);
      border-color: rgba(0,229,255,0.2);
      color: var(--text);
    }
    .feat-icon { font-size: 1.6rem; }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Noise grain */
    body::after {
      content: '';
      position: fixed; top:0; left:0; width:100%; height:100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 5;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="scene">
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <h1>BEATFORGE</h1>
      <p class="tag">Professional Web Music Studio</p>
    </div>

    <div class="card">
      <h2>Start Creating</h2>
      <p>Sign in to save your projects to the cloud and access them anywhere.</p>

      <button class="btn btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
        <div class="spinner" id="google-spinner"></div>
      </button>

      <button class="btn btn-guest" id="btn-guest">
        Try as Guest (no cloud save)
      </button>

      <p id="error-msg"></p>
    </div>

    <div class="features">
      <div class="feat"><span class="feat-icon">🥁</span>Sequencer</div>
      <div class="feat"><span class="feat-icon">🎹</span>Piano Roll</div>
      <div class="feat"><span class="feat-icon">🎛️</span>Mixer</div>
      <div class="feat"><span class="feat-icon">🔊</span>Synth</div>
      <div class="feat"><span class="feat-icon">🎚️</span>FX Chain</div>
      <div class="feat"><span class="feat-icon">☁️</span>Cloud Save</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    // ── Background waveform animation ────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const BARS = 120;
    const bars = Array.from({ length: BARS }, (_, i) => ({
      x: (i / BARS) * 2,
      phase: Math.random() * Math.PI * 2,
      freq: 0.4 + Math.random() * 1.2,
      amp: 20 + Math.random() * 80,
    }));

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      bars.forEach((b, i) => {
        const x = (i / BARS) * canvas.width;
        const h = b.amp * (Math.sin(t * b.freq + b.phase) * 0.5 + 0.5) *
                  (Math.sin(t * b.freq * 0.3 + b.phase * 1.7) * 0.3 + 0.7);
        const alpha = 0.15 + 0.5 * (h / (b.amp));
        ctx.fillStyle = `rgba(0, 229, 255, ${alpha})`;
        ctx.fillRect(x - 1, cy - h / 2, 2, h);
      });

      // Grid lines
      ctx.strokeStyle = 'rgba(0,229,255,0.04)';
      ctx.lineWidth = 1;
      for (let gy = 0; gy < canvas.height; gy += 40) {
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(canvas.width, gy);
        ctx.stroke();
      }
      for (let gx = 0; gx < canvas.width; gx += 60) {
        ctx.beginPath();
        ctx.moveTo(gx, 0);
        ctx.lineTo(gx, canvas.height);
        ctx.stroke();
      }

      t += 0.012;
      requestAnimationFrame(draw);
    }
    draw();

    // ── Auth ──────────────────────────────────────────────────
    try {
      // Check if already signed in
      firebase.auth().onAuthStateChanged(user => {
        if (user) window.location.href = 'daw.html';
      });
    } catch(e) {}

    document.getElementById('btn-google').addEventListener('click', async () => {
      const spinner = document.getElementById('google-spinner');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      spinner.style.display = 'block';
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
        window.location.href = 'daw.html';
      } catch(e) {
        spinner.style.display = 'none';
        errEl.textContent = e.code === 'auth/popup-closed-by-user'
          ? 'Sign-in was cancelled.'
          : 'Error: ' + (e.message || 'Authentication failed');
        errEl.style.display = 'block';
      }
    });

    document.getElementById('btn-guest').addEventListener('click', () => {
      sessionStorage.setItem('guestMode', 'true');
      window.location.href = 'daw.html';
    });
  </script>
</body>
</html>
